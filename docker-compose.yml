services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
      - VITE_DEV_API_PROXY=http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://livematch:livematch@postgres:5432/livematch?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=livematch
      - POSTGRES_PASSWORD=livematch
      - POSTGRES_DB=livematch
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livematch -d livematch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=admin@livematch.dev
  #     - PGADMIN_DEFAULT_PASSWORD=livematch
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

volumes:
  frontend_node_modules:
  postgres_data:
